<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTG List Comparator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="feedback-bar">
    <span class="feedback-text">Send your feedback!</span>
    <button class="feedback-btn" id="copyEmailBtn" title="Copy email address">
      <svg class="mail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"></rect>
        <path d="M22 4L12 13L2 4"></path>
      </svg>
      <span class="feedback-btn-text">Copy Email</span>
      <span class="feedback-copied">Copied!</span>
    </button>
  </div>
  <div class="container">
    <h1>MTG List Comparator</h1>

    <div class="form-section">
      <input
        type="url"
        id="url1"
        class="url-input"
        placeholder="Paste first list URL (e.g., https://www.moxfield.com/decks/...)"
      />

      <div class="to-label">TO</div>

      <input
        type="url"
        id="url2"
        class="url-input"
        placeholder="Paste second list URL (e.g., https://www.moxfield.com/decks/...)"
      />

      <button id="compareBtn" class="compare-btn">🔍 Compare</button>
    </div>

    <div id="progress" class="progress-container">
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <div id="progressText" class="progress-text"></div>
    </div>

    <div id="status" class="status"></div>

    <div id="results" class="results"></div>
  </div>

  <script src="app.js"></script>
  <script>
    document.getElementById("copyEmailBtn").addEventListener("click", function () {
      navigator.clipboard.writeText("ormanlaybars@gmail.com").then(() => {
        this.classList.add("copied");
        setTimeout(() => this.classList.remove("copied"), 2000);
      });
    });
  </script>
</body>
</html>
